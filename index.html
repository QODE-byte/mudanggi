<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>무당기(巫堂記) — 신들이 지켜보는 이야기</title>
<meta name="description" content="신내림을 거부해온 취준생이 신들의 시험 앞에 선다.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#fbbf24;--purple:#c084fc;--teal:#67e8f9;--red:#f87171;
  --bg:#08060f;--text:#e8e0d8;--muted:rgba(255,255,255,.4);
}
html,body{
  width:100%;min-height:100vh;background:var(--bg);
  font-family:'Noto Serif KR','Malgun Gothic',serif;
  color:var(--text);overflow:hidden;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
@keyframes twinkle{0%,100%{opacity:.08}50%{opacity:.35}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes deityIn{from{opacity:0;transform:translateY(-20px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes deityOut{from{opacity:1}to{opacity:0;transform:translateY(-10px)}}
@keyframes mindamIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}

#app{max-width:780px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative;}
#stars-layer{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{position:absolute;border-radius:50%;background:#c084fc;animation:twinkle 4s ease-in-out infinite;}

/* HUD */
#hud{
  position:sticky;top:0;z-index:100;padding:10px 16px;
  background:linear-gradient(180deg,rgba(8,6,15,.98) 80%,transparent 100%);
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(192,132,252,.12);min-height:44px;
}
#hud-left{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--gold);letter-spacing:.1em;font-weight:700;}
#hud-stats{display:flex;align-items:center;gap:10px;}
#hud-trust-pills{display:flex;align-items:center;gap:10px;}
.stat-pill{display:flex;align-items:center;gap:4px;font-size:10px;}
.stat-track{width:36px;height:3px;background:rgba(255,255,255,.08);border-radius:2px;}
.stat-fill{height:100%;border-radius:2px;transition:width .5s ease;}
.seolhwa-tag{font-size:11px;color:var(--purple);letter-spacing:.04em;}
.coin-tag{font-size:11px;padding:2px 8px;border:1px solid rgba(103,232,249,.25);border-radius:3px;background:rgba(103,232,249,.05);color:var(--teal);}
#ep-info{font-size:10px;color:rgba(255,255,255,.18);letter-spacing:.08em;}
#menu-btn{
  background:none;border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.4);
  font-size:14px;padding:4px 8px;border-radius:3px;cursor:pointer;
  transition:all .15s;font-family:inherit;
}
#menu-btn:hover{border-color:var(--gold);color:var(--gold);}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;position:relative;z-index:10;}
#scene-bg{flex:1;min-height:180px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.bg-overlay{position:absolute;inset:0;transition:background 1.2s ease;}
.bg-shrine{background:radial-gradient(ellipse 70% 50% at 50% 30%,#1a0a2e 0%,#08060f 65%);}
.bg-dark{background:radial-gradient(ellipse 70% 50% at 50% 30%,#120820 0%,#08060f 65%);}
.bg-subway{background:radial-gradient(ellipse 70% 50% at 50% 30%,#0a1020 0%,#08060f 65%);}
.bg-dream{background:radial-gradient(ellipse 80% 60% at 50% 40%,#1a0f30 0%,#08060f 50%);}
.scene-illus{position:relative;z-index:1;text-align:center;padding:40px 24px;opacity:.15;font-size:72px;user-select:none;pointer-events:none;}

/* DIALOG */
#dialog-wrap{
  position:relative;z-index:10;
  border-top:1px solid rgba(192,132,252,.12);
  background:linear-gradient(180deg,rgba(8,6,15,.72) 0%,rgba(8,6,15,.97) 100%);
  padding:22px 26px 18px;cursor:pointer;min-height:164px;
}
#speaker-name{
  display:inline-flex;align-items:center;font-size:12px;font-weight:700;letter-spacing:.1em;
  padding:3px 12px;border:1px solid;border-radius:2px;margin-bottom:14px;background:rgba(0,0,0,.5);
  transition:color .3s,border-color .3s;
}
#dialog-text{font-size:15px;line-height:2;color:var(--text);white-space:pre-wrap;min-height:60px;}
#cursor-blink{display:inline;animation:blink .7s step-end infinite;color:var(--gold);}
#skip-hint{font-size:10px;color:rgba(255,255,255,.14);text-align:right;margin-top:8px;letter-spacing:.05em;}

/* CHOICES */
#choices-wrap{position:relative;z-index:10;padding:6px 26px 28px;background:rgba(8,6,15,.97);display:none;flex-direction:column;gap:8px;}
.choice-btn{
  display:flex;align-items:center;gap:10px;width:100%;text-align:left;
  padding:12px 16px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.08);
  border-radius:3px;color:#b5b0a8;font-size:14px;cursor:pointer;font-family:inherit;
  letter-spacing:.02em;transition:background .15s,border-color .15s,color .15s,transform .12s;
  animation:slideIn .25s ease both;
}
.choice-btn:hover:not(:disabled){background:rgba(192,132,252,.08);border-color:var(--purple);color:#e9d5ff;transform:translateX(5px);}
.choice-btn:disabled.choice-locked-disabled{opacity:.38;cursor:not-allowed;}
.choice-arrow{color:var(--gold);font-size:10px;flex-shrink:0;}
.choice-arrow.locked-afford{color:#fbbf24;}
.choice-arrow.locked-broke{color:rgba(255,255,255,.25);}
.choice-fx{margin-left:auto;font-size:10px;color:rgba(255,255,255,.22);letter-spacing:.05em;flex-shrink:0;}
.choice-lock-cost{margin-left:auto;font-size:10px;color:#fbbf24;letter-spacing:.05em;flex-shrink:0;padding:2px 6px;border:1px solid rgba(251,191,36,.3);border-radius:2px;}
.choice-lock-cost.broke{color:rgba(255,255,255,.2);border-color:rgba(255,255,255,.1);}

/* DEITY POPUP */
#constellation-popup{
  display:none;position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:200;
  max-width:420px;width:90%;padding:14px 20px;
  background:linear-gradient(135deg,rgba(192,132,252,.12) 0%,rgba(251,191,36,.08) 100%);
  border:1px solid rgba(192,132,252,.25);border-radius:6px;backdrop-filter:blur(8px);
  animation:deityIn .4s ease;text-align:center;
}
#constellation-popup.hiding{animation:deityOut .3s ease forwards;}
.const-msg{font-size:12px;color:var(--purple);line-height:1.7;}
.const-coin{font-size:11px;color:var(--gold);margin-top:6px;}
.const-favor{font-size:10px;color:rgba(255,255,255,.28);margin-top:4px;}

/* MINDAM POPUP (설화 팝업) */
#seolhwa-popup{
  display:none;position:fixed;inset:0;z-index:300;
  align-items:center;justify-content:center;
  background:rgba(8,6,15,.88);backdrop-filter:blur(6px);
  animation:mindamIn .5s ease;
}
.seolhwa-popup-inner{text-align:center;padding:40px;}
.seolhwa-popup-icon{font-size:64px;margin-bottom:16px;}
.seolhwa-popup-label{font-size:10px;letter-spacing:.3em;color:var(--gold);margin-bottom:8px;}
.seolhwa-popup-name{font-size:22px;font-weight:700;color:#fff;margin-bottom:8px;}
.seolhwa-popup-desc{font-size:13px;color:var(--purple);line-height:1.8;max-width:380px;}

/* TITLE */
#title-screen{
  display:none;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:48px 24px;text-align:center;position:relative;z-index:10;
  animation:fadeUp .6s ease;
}
.title-label{font-size:10px;letter-spacing:.35em;color:var(--gold);margin-bottom:14px;opacity:.7;}
.title-main{font-size:clamp(40px,9vw,72px);font-weight:900;line-height:1.08;color:#fff;margin-bottom:8px;letter-spacing:-.02em;text-shadow:0 0 80px rgba(192,132,252,.2);}
.title-sub{font-size:16px;font-weight:400;color:var(--purple);margin-bottom:6px;letter-spacing:.05em;}
.title-en{font-size:11px;letter-spacing:.18em;color:rgba(255,255,255,.22);margin-bottom:28px;}
.title-divider{width:40px;height:1px;background:rgba(192,132,252,.35);margin:0 auto 24px;}
.title-quote{font-size:14px;line-height:2;color:rgba(255,255,255,.45);margin-bottom:40px;font-style:italic;}
.orv-btn{
  padding:13px 42px;background:transparent;border:1px solid var(--purple);color:var(--purple);
  font-size:13px;letter-spacing:.12em;cursor:pointer;border-radius:2px;font-family:inherit;
  transition:background .2s,box-shadow .2s,transform .1s;
}
.orv-btn:hover{background:rgba(192,132,252,.1);box-shadow:0 0 24px rgba(192,132,252,.15);}
.orv-btn:active{transform:scale(.98);}
.char-select-title{font-size:11px;letter-spacing:.12em;color:rgba(255,255,255,.3);margin-bottom:14px;margin-top:28px;}
.char-cards{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-bottom:18px;}
.char-card{
  padding:14px 18px;border:1px solid rgba(255,255,255,.08);border-radius:4px;
  background:rgba(255,255,255,.02);cursor:pointer;min-width:130px;text-align:center;
  transition:all .2s;position:relative;
}
.char-card:hover,.char-card.selected{border-color:var(--purple);background:rgba(192,132,252,.07);transform:translateY(-2px);}
.char-card-name{font-size:14px;font-weight:700;margin-bottom:4px;}
.char-card-desc{font-size:11px;color:rgba(255,255,255,.38);line-height:1.5;white-space:pre-line;}
.char-badge{position:absolute;top:-6px;right:-6px;font-size:9px;padding:2px 6px;border-radius:2px;background:rgba(103,232,249,.12);border:1px solid rgba(103,232,249,.28);color:var(--teal);}
.legal-note{margin-top:20px;font-size:10px;color:rgba(255,255,255,.14);}

/* CLEAR */
#clear-screen{
  display:none;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:48px 24px;text-align:center;position:relative;z-index:10;
  animation:fadeUp .5s ease;
}
.clear-star{font-size:40px;color:var(--gold);margin-bottom:18px;animation:pulse 2.5s ease infinite;}
.clear-ep{font-size:10px;letter-spacing:.25em;color:rgba(255,255,255,.25);margin-bottom:8px;}
.clear-title{font-size:26px;font-weight:700;color:#fff;margin-bottom:22px;}
.clear-msg{font-size:13px;line-height:2.1;color:var(--purple);margin-bottom:28px;white-space:pre-wrap;max-width:440px;font-style:italic;}
.stats-grid{display:flex;gap:28px;margin-bottom:36px;}
.stat-card{display:flex;flex-direction:column;align-items:center;gap:5px;font-size:11px;color:rgba(255,255,255,.4);}
.stat-val{font-size:24px;font-weight:700;}
.ending-label{font-size:11px;letter-spacing:.1em;padding:4px 14px;border-radius:2px;margin-bottom:24px;}
.clear-buttons{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}

/* MODAL */
.modal-overlay{
  display:none;position:fixed;inset:0;z-index:250;
  align-items:center;justify-content:center;
  background:rgba(8,6,15,.82);backdrop-filter:blur(4px);
}
.modal-content{
  width:90%;max-width:520px;max-height:80vh;
  background:#0d0b18;border:1px solid rgba(192,132,252,.18);border-radius:8px;
  display:flex;flex-direction:column;overflow:hidden;
  animation:fadeUp .3s ease;
}
.modal-tabs-wrap{display:flex;overflow-x:auto;border-bottom:1px solid rgba(255,255,255,.06);padding:0 4px;}
.modal-tab{
  flex-shrink:0;padding:10px 14px;font-size:11px;letter-spacing:.04em;
  background:none;border:none;color:rgba(255,255,255,.35);cursor:pointer;
  font-family:inherit;border-bottom:2px solid transparent;transition:all .15s;
}
.modal-tab:hover{color:rgba(255,255,255,.65);}
.modal-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.modal-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px;}
.modal-empty{text-align:center;color:rgba(255,255,255,.28);padding:36px 0;font-size:13px;}
.modal-card{
  display:flex;align-items:center;gap:12px;padding:12px;
  background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.07);
  border-radius:4px;
}
.modal-card.locked{opacity:.45;}
.modal-card.seolhwa-owned{border-color:rgba(192,132,252,.28);background:rgba(192,132,252,.04);}
.modal-card-icon{font-size:22px;flex-shrink:0;width:34px;text-align:center;}
.modal-card-info{flex:1;min-width:0;}
.modal-card-name{font-size:13px;font-weight:700;margin-bottom:2px;}
.modal-card-desc{font-size:11px;color:rgba(255,255,255,.38);line-height:1.5;}
.modal-card-btn{
  flex-shrink:0;padding:5px 10px;font-size:11px;
  background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.25);
  color:var(--gold);border-radius:3px;cursor:pointer;font-family:inherit;transition:all .15s;
}
.modal-card-btn:hover{background:rgba(251,191,36,.15);}
.modal-card-btn.disabled{opacity:.28;cursor:not-allowed;}
.const-bar-wrap{width:100%;height:3px;background:rgba(255,255,255,.08);border-radius:2px;margin:4px 0;}
.const-bar{height:100%;border-radius:2px;transition:width .5s;}
.modal-close-btn{
  padding:10px;text-align:center;font-size:12px;letter-spacing:.1em;
  background:none;border:none;border-top:1px solid rgba(255,255,255,.06);
  color:rgba(255,255,255,.35);cursor:pointer;font-family:inherit;transition:color .15s;
}
.modal-close-btn:hover{color:var(--gold);}

/* FOOTER */
#footer-bar{text-align:center;padding:12px;font-size:10px;color:rgba(255,255,255,.1);border-top:1px solid rgba(255,255,255,.04);position:relative;z-index:10;}

/* MOBILE */
@media(max-width:520px){
  #dialog-wrap{padding:18px 18px 14px;}
  #choices-wrap{padding:4px 18px 22px;}
  .char-cards{gap:8px;}
  .char-card{min-width:110px;padding:12px 14px;}
  #hud{padding:8px 12px;}
  .stat-track{width:28px;}
  .modal-content{width:95%;max-height:85vh;}
  .stats-grid{gap:18px;}
}
</style>
</head>
<body>

<div id="stars-layer"></div>

<!-- 신위 팝업 -->
<div id="constellation-popup">
  <div class="const-msg" id="const-msg"></div>
  <div class="const-coin" id="const-coin"></div>
  <div class="const-favor" id="const-favor"></div>
</div>

<!-- 민담 팝업 -->
<div id="seolhwa-popup">
  <div class="seolhwa-popup-inner">
    <div class="seolhwa-popup-label">민담 획득</div>
    <div class="seolhwa-popup-icon" id="seolhwa-popup-icon"></div>
    <div class="seolhwa-popup-name" id="seolhwa-popup-name"></div>
    <div class="seolhwa-popup-desc" id="seolhwa-popup-desc"></div>
  </div>
</div>

<!-- 모달 -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-content">
    <div class="modal-tabs-wrap" id="modal-tabs"></div>
    <div class="modal-body" id="modal-body"></div>
    <button class="modal-close-btn" id="modal-close-btn">닫기</button>
  </div>
</div>

<div id="app">

  <!-- 타이틀 -->
  <div id="title-screen">
    <div class="title-label">MUDANGGI — 巫堂記</div>
    <div class="title-main">무당기</div>
    <div class="title-sub">巫堂記</div>
    <div class="title-en">신들이 지켜보는 이야기</div>
    <div class="title-divider"></div>
    <div class="title-quote">"신내림을 거부해온 취준생이<br>신들의 시험 앞에 선다."</div>
    <div class="char-select-title">-- 주인공 선택 --</div>
    <div class="char-cards" id="char-cards"></div>
    <button class="orv-btn" id="start-btn">이야기 시작하기</button>
    <div class="true-end-hint" id="true-end-hint" style="display:none"></div>
    <div class="legal-note">오리지널 IP . 한국 무속신앙 기반 선택형 비주얼노벨 . 프로토타입 v0.1</div>
  </div>

  <!-- 게임 -->
  <div id="game-screen" style="display:none;flex-direction:column;flex:1;">
    <div id="hud">
      <div id="hud-left">무당기</div>
      <div id="ep-info">1막 · 귀가</div>
      <div id="hud-stats">
        <div id="hud-trust-pills"></div>
        <span class="seolhwa-tag" id="val-seolhwa">📜 0</span>
        <span class="coin-tag" id="val-coin">🔮 0</span>
        <button id="menu-btn">☰</button>
      </div>
    </div>
    <div id="main">
      <div id="scene-bg">
        <div class="bg-overlay bg-dark" id="bg-overlay"></div>
        <div class="scene-illus" id="scene-illus">🕯️</div>
      </div>
      <div id="dialog-wrap" onclick="skipTyping()">
        <div id="speaker-name"></div>
        <div id="dialog-text"></div>
        <div id="skip-hint">클릭하여 건너뛰기</div>
      </div>
      <div id="choices-wrap"></div>
    </div>
    <div id="footer-bar">무당기(巫堂記) · 1막 프로토타입 · 오리지널 IP</div>
  </div>

  <!-- 클리어 -->
  <div id="clear-screen">
    <div class="clear-star" id="clear-star">◈</div>
    <div class="clear-ep" id="clear-ep-label">1막</div>
    <div class="clear-title" id="clear-title">클리어!</div>
    <div class="clear-msg" id="clear-msg"></div>
    <div id="ending-badge" class="ending-label"></div>
    <div class="stats-grid">
      <div class="stat-card">
        <span style="color:var(--purple)">인연</span>
        <span class="stat-val" style="color:var(--purple)" id="final-trust">0</span>
      </div>
      <div class="stat-card">
        <span style="color:var(--gold)">민담</span>
        <span class="stat-val" style="color:var(--gold)" id="final-seolhwa">0</span>
      </div>
      <div class="stat-card">
        <span style="color:var(--teal)">신기</span>
        <span class="stat-val" style="color:var(--teal)" id="final-coin">0</span>
      </div>
    </div>
    <div class="clear-buttons">
      <button class="orv-btn" id="next-ep-btn" style="display:none;">2막으로 ▶</button>
      <button class="orv-btn" id="retry-btn">처음부터 다시</button>
    </div>
  </div>

</div>

<script>
// =======================================
// DATA — 무당기(巫堂記) 게임 데이터
// =======================================

const CHARS = {
  maehyang: {
    name:'이매향', col:'#c084fc',
    desc:'취준생 / 무당의 딸\n신내림을 거부해온 24세',
    illus:'🕯️', style:'직관/감성'
  },
};

// --- 화자 맵 ---
const SPEAKER_MAP = {
  maehyang: {name:'이매향',    col:'#c084fc'},
  chilsung:  {name:'칠성신',   col:'#fbbf24'},
  samshin:   {name:'삼신할머니',col:'#f9a8d4'},
  sungju:    {name:'성주신',   col:'#86efac'},
  gumiho:    {name:'구미호 신모',col:'#fb923c'},
  mother:    {name:'어머니',   col:'#a78bfa'},
  neighbor:  {name:'아주머니', col:'#6ee7b7'},
  woman:     {name:'여자',     col:'#f9a8d4'},
  child:     {name:'아이',     col:'#67e8f9'},
  narrator:  {name:'',         col:'#94a3b8'},
  system:    {name:'SYSTEM',   col:'#22d3ee'},
};

// --- 인연 대상 인물 ---
const TRUST_TARGETS = {
  mother:   {name:'어머니',   col:'#a78bfa', icon:'🕯️'},
  neighbor: {name:'아주머니', col:'#6ee7b7', icon:'🏠'},
  woman:    {name:'단골손님', col:'#f9a8d4', icon:'🙏'},
  child:    {name:'아이',     col:'#67e8f9', icon:'👁️'},
};

// --- 신위(神位) 8신 — 성좌 대체 ---
const DEITIES = {
  chilsung: {
    name:'칠성신(七星神)', icon:'⭐',
    likes:['지혜','관찰','진실','거래'], dislikes:['충동','거짓','회피'],
  },

<script>
// =======================================
// ENGINE — 무당기(巫堂記) 게임 엔진
// =======================================

let state = {
  phase: 'title',
  char: 'maehyang',
  scenes: null,
  sceneId: 's0',
  ep: 1,
  trust: {},          // 인물별 인연 수치
  mindam: [],         // 획득한 민담 ID 배열
  singi: 0,           // 신기 (기존 coin)
  items: [],          // 획득 아이템 키 배열
  skills: [],         // 해금된 스킬 ID 배열
  deityYeonin: {},    // 신위별 인연 (기존 constellationTrust)
  deitySponsored: {}, // 신위별 신기 수령 총액
  flags: {},          // 씬 플래그 (dealMade, shinnul 등)
  sacrificeCount: 0,  // 희생 태그 횟수
  acceptCount: 0,     // 수용 태그 횟수
  resistCount: 0,     // 저항 태그 횟수
  truthCount: 0,      // 진실/직관 태그 횟수
  dispTxt: '',
  typing: false,
  choicesOn: false,
  lastClear: null,
  shopHintActive: false,
};
let typingTimer = null;
let constTimer = null;
let currentTab = 'inventory';

function resetTrust() {
  const t = {};
  Object.keys(TRUST_TARGETS).forEach(k => t[k] = 0);
  return t;
}

function resetDeityYeonin() {
  const y = {}, s = {};
  Object.keys(DEITIES).forEach(k => { y[k] = 0; s[k] = 0; });
  return {yeonin: y, sponsored: s};
}

function getDefaultSkills(charId) {
  return (SKILLS[charId] || []).filter(s => !s.locked).map(s => s.id);
}

// --- SAVE/LOAD ---
function getSaveData() {
  try { return JSON.parse(localStorage.getItem('mudanggi_save') || '{}'); } catch(e) { return {}; }
}
function setSaveData(d) {
  try { localStorage.setItem('mudanggi_save', JSON.stringify(d)); } catch(e) {}
}

// --- MODAL ---
function openModal(tab) {
  currentTab = tab || 'inventory';
  renderModalTabs();
  renderModalContent();
  document.getElementById('modal-overlay').style.display = 'flex';
}
function closeModal() {
  document.getElementById('modal-overlay').style.display = 'none';
}

// --- INIT ---
function init() {
  buildStars();
  buildCharCards();
  showScreen('title');

  document.getElementById('start-btn').onclick = startGame;
  document.getElementById('retry-btn').onclick = () => {
    showScreen('title');
    buildCharCards();
  };
  document.getElementById('next-ep-btn').onclick = continueNextEp;
  document.getElementById('menu-btn').onclick = () => openModal('inventory');
  document.getElementById('modal-close-btn').onclick = closeModal;
  document.getElementById('modal-overlay').onclick = (e) => {
    if (e.target.id === 'modal-overlay') closeModal();
  };
}

function buildStars() {
  const layer = document.getElementById('stars-layer');
  layer.innerHTML = '';
  for (let i = 0; i < 28; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 2 + 0.5;
    s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*5}s;animation-duration:${2+Math.random()*5}s;opacity:0.12`;
    layer.appendChild(s);
  }
}

function buildCharCards() {
  const wrap = document.getElementById('char-cards');
  wrap.innerHTML = '';
  const save = getSaveData();
  Object.entries(CHARS).forEach(([id, ch]) => {
    const card = document.createElement('div');
    card.className = 'char-card' + (id === state.char ? ' selected' : '');
    card.dataset.id = id;
    const completed = save[id] && save[id].completed;
    card.innerHTML = `
      <div style="font-size:28px;margin-bottom:8px">${ch.illus}</div>
      <div class="char-card-name" style="color:${ch.col}">${ch.name}</div>
      <div class="char-card-desc">${ch.desc}</div>
      ${completed ? '<div class="char-badge">CLEAR</div>' : ''}
    `;
    card.onclick = () => {
      document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      state.char = id;
    };
    wrap.appendChild(card);
  });
}

function showScreen(screen) {
  document.getElementById('title-screen').style.display = screen === 'title' ? 'flex' : 'none';
  document.getElementById('game-screen').style.display  = screen === 'game'  ? 'flex' : 'none';
  document.getElementById('clear-screen').style.display = screen === 'clear' ? 'flex' : 'none';
}

// --- GAME START ---
function startGame() {
  state.scenes = ALL_SCENES[state.char];
  state.sceneId = 's0';
  state.ep = 1;
  state.trust = resetTrust();
  state.mindam = [];
  state.singi = 0;
  state.items = [];
  state.skills = getDefaultSkills(state.char);
  const dData = resetDeityYeonin();
  state.deityYeonin = dData.yeonin;
  state.deitySponsored = dData.sponsored;
  state.flags = {};
  state.sacrificeCount = 0;
  state.acceptCount = 0;
  state.resistCount = 0;
  state.truthCount = 0;
  state.phase = 'game';
  state.lastClear = null;
  state.shopHintActive = false;
  showScreen('game');
  updateEpInfo();
  loadScene('s0');
}

function continueNextEp() {
  if (!state.lastClear || !state.lastClear.next) return;
  state.ep++;
  state.phase = 'game';
  showScreen('game');
  updateEpInfo();
  loadScene(state.lastClear.next);
}

function updateEpInfo() {
  document.getElementById('ep-info').textContent = '1막 · ' + (state.ep > 1 ? state.ep + '씬' : '귀가');
}

// --- LOAD SCENE ---
function loadScene(id) {
  if (typingTimer) { clearInterval(typingTimer); typingTimer = null; }
  state.sceneId = id;
  state.dispTxt = '';
  state.typing = true;
  state.choicesOn = false;

  const sc = state.scenes[id];
  if (!sc) { console.warn('씬 없음:', id); return; }

  // 화자
  const nameEl = document.getElementById('speaker-name');
  const spInfo = SPEAKER_MAP[sc.sp] || SPEAKER_MAP.narrator;
  if (spInfo.name) {
    nameEl.textContent = sc.sp === 'system' ? `【 ${spInfo.name} 】` : spInfo.name;
    nameEl.style.display = 'inline-flex';
    nameEl.style.color = spInfo.col;
    nameEl.style.borderColor = spInfo.col + '55';
  } else {
    nameEl.style.display = 'none';
  }

  document.getElementById('scene-illus').textContent = sc.illus || '🕯️';
  document.getElementById('bg-overlay').className = 'bg-overlay bg-' + (sc.bg || 'dark');

  const dtEl = document.getElementById('dialog-text');
  dtEl.style.fontFamily = "'Noto Serif KR',serif";
  dtEl.style.color = '#e0dbd2';

  const cw = document.getElementById('choices-wrap');
  cw.style.display = 'none';
  cw.innerHTML = '';

  // 타이핑
  document.getElementById('skip-hint').style.opacity = '1';
  const full = sc.txt;
  let i = 0;
  typingTimer = setInterval(() => {
    i++;
    state.dispTxt = full.slice(0, i);
    renderText();
    if (i >= full.length) {
      clearInterval(typingTimer); typingTimer = null;
      state.typing = false;
      state.choicesOn = true;
      document.getElementById('skip-hint').style.opacity = '0';
      showChoices();
    }
  }, 28);

  updateHUD();
  maybeShowDeity();
}

function renderText() {
  const el = document.getElementById('dialog-text');
  const lines = state.dispTxt.split('\n');
  let html = lines.map((l, idx) => l + (idx < lines.length - 1 ? '<br>' : '')).join('');
  if (state.typing) html += '<span id="cursor-blink">|</span>';
  el.innerHTML = html;
}

function skipTyping() {
  if (!state.typing) return;
  if (typingTimer) { clearInterval(typingTimer); typingTimer = null; }
  const sc = state.scenes[state.sceneId];
  state.dispTxt = sc.txt;
  state.typing = false;
  state.choicesOn = true;
  document.getElementById('skip-hint').style.opacity = '0';
  renderText();
  showChoices();
}

// --- CHOICES ---
function showChoices() {
  const sc = state.scenes[state.sceneId];
  if (!sc || !sc.ch || sc.ch.length === 0) return;
  const cw = document.getElementById('choices-wrap');
  cw.innerHTML = '';

  sc.ch.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.style.animationDelay = `${i * 0.07}s`;

    const lockedCost = c.locked || 0;
    const canAfford = lockedCost === 0 || state.singi >= lockedCost;

    let prefix = lockedCost > 0
      ? `<span class="choice-arrow ${canAfford ? 'locked-afford' : 'locked-broke'}">🔒</span>`
      : `<span class="choice-arrow">▷</span>`;

    let suffix = '';
    if (lockedCost > 0) {
      suffix = `<span class="choice-fx choice-lock-cost ${canAfford ? '' : 'broke'}">신기 ${lockedCost}</span>`;
    } else if (c.hint) {
      suffix = `<span class="choice-fx">${c.hint}</span>`;
    }

    btn.innerHTML = `${prefix}${c.t}${suffix}`;

    if (!canAfford) {
      btn.disabled = true;
      btn.classList.add('choice-locked-disabled');
    } else {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        handleChoice(c);
      });
    }
    cw.appendChild(btn);
  });
  cw.style.display = 'flex';
}

// --- HANDLE CHOICE ---
function handleChoice(choice) {
  const f = choice.fx || {};

  // 신기 잠금 소모
  if (choice.locked && choice.locked > 0) {
    state.singi = Math.max(0, state.singi - choice.locked);
  }

  // 인물별 인연 변화
  if (f.trust && typeof f.trust === 'object') {
    Object.entries(f.trust).forEach(([key, val]) => {
      if (state.trust[key] !== undefined) {
        state.trust[key] = Math.min(100, Math.max(0, state.trust[key] + val));
      }
    });
  }
  // trust2 (보조 인연 — 일부 씬에서 두 인물 동시 처리용)
  if (f.trust2 && typeof f.trust2 === 'object') {
    Object.entries(f.trust2).forEach(([key, val]) => {
      if (state.trust[key] !== undefined) {
        state.trust[key] = Math.min(100, Math.max(0, state.trust[key] + val));
      }
    });
  }

  // 신기 변화
  if (f.singi) {
    state.singi = Math.max(0, state.singi + f.singi);
  }

  // 신위 인연 변화
  if (f.deity && typeof f.deity === 'object') {
    Object.entries(f.deity).forEach(([key, val]) => {
      if (state.deityYeonin[key] !== undefined) {
        state.deityYeonin[key] = Math.min(100, Math.max(0, state.deityYeonin[key] + val));
      }
    });
  }

  // 아이템
  if (f.item && !state.items.includes(f.item)) {
    state.items.push(f.item);
    showItemPopup(f.item);
  }

  // 민담 즉시 획득
  if (f.mindam && !state.mindam.includes(f.mindam)) {
    state.mindam.push(f.mindam);
    const def = MINDAM_DEFS[f.mindam];
    if (def) showMindamPopup(def);
  }

  // 플래그
  if (f.flag && typeof f.flag === 'object') {
    Object.assign(state.flags, f.flag);
  }

  // 태그 기반 카운터
  const tags = f.tags || [];
  if (tags.includes('희생') || tags.includes('보호')) state.sacrificeCount++;
  if (tags.includes('수용')) state.acceptCount++;
  if (tags.includes('저항')) state.resistCount++;
  if (tags.includes('진실') || tags.includes('직관')) state.truthCount++;

  // 신위 매칭 신기 후원
  if (tags.length > 0) processDeityResponse(tags);

  // 민담 조건 자동 체크
  checkMindamConditions();

  updateHUD();

  const next = state.scenes[choice.n];
  if (next && next.clr) {
    goToClear(choice.n, next);
  } else if (next) {
    loadScene(choice.n);
  } else {
    console.warn('다음 씬 없음:', choice.n);
  }
}

// --- DEITY RESPONSE ---
function processDeityResponse(tags) {
  let bestKey = null;
  let bestScore = 0;

  Object.entries(DEITIES).forEach(([key, d]) => {
    let score = 0;
    tags.forEach(tag => {
      if (d.likes && d.likes.includes(tag)) score += 1;
      if (d.dislikes && d.dislikes.includes(tag)) score -= 1;
    });
    if (score > bestScore) { bestScore = score; bestKey = key; }
  });

  if (!bestKey || bestScore <= 0) return;

  const singiReward = Math.floor(Math.random() * 8 + 3) * bestScore;
  state.singi += singiReward;
  state.deityYeonin[bestKey] = Math.min(100, (state.deityYeonin[bestKey] || 0) + 2 * bestScore);
  state.deitySponsored[bestKey] = (state.deitySponsored[bestKey] || 0) + singiReward;

  const d = DEITIES[bestKey];
  const yeonin = state.deityYeonin[bestKey];

  // 인연 30+ → 스킬 힌트
  if (yeonin >= 30 && yeonin < 35) {
    showDeityPopup(`${d.icon} 【${d.name}】이 인연 30에 도달했습니다.\n숨겨진 선택지가 열릴 수 있습니다.`, singiReward, yeonin);
    checkDeitySkillUnlock(bestKey);
  } else if (Math.random() < 0.35) {
    showDeityPopup(`${d.icon} 【${d.name}】이 주목합니다. +${singiReward} 신기`, singiReward, yeonin);
  }

  updateHUD();
}

function checkDeitySkillUnlock(deityKey) {
  const unlockMap = { chilsung: 'contract', gumiho: 'mindam_eye' };
  const skillId = unlockMap[deityKey];
  if (skillId && !state.skills.includes(skillId)) {
    state.skills.push(skillId);
  }
}

// --- MINDAM CHECK ---
function checkMindamConditions() {
  const checks = [
    { id:'bari',      condition: () => state.sacrificeCount >= 2 },
    { id:'shimchung', condition: () => state.acceptCount >= 3 },
    { id:'gumiho_s',  condition: () => state.truthCount >= 3 },
  ];
  checks.forEach(({ id, condition }) => {
    if (!state.mindam.includes(id) && condition()) {
      state.mindam.push(id);
      const def = MINDAM_DEFS[id];
      if (def) showMindamPopup(def);
    }
  });
  // mindam_eye 스킬 해금
  if (state.mindam.length >= 3 && !state.skills.includes('mindam_eye')) {
    state.skills.push('mindam_eye');
  }
}

// --- POPUPS ---
function showDeityPopup(msg, singi, yeonin) {
  const popup = document.getElementById('constellation-popup');
  document.getElementById('const-msg').textContent = msg;
  document.getElementById('const-coin').textContent = singi > 0 ? `+${singi} 신기` : '';
  document.getElementById('const-coin').style.display = singi > 0 ? 'block' : 'none';
  document.getElementById('const-favor').textContent = `인연: ${yeonin}`;
  popup.classList.remove('hiding');
  popup.style.display = 'block';
  if (constTimer) clearTimeout(constTimer);
  constTimer = setTimeout(() => {
    popup.classList.add('hiding');
    setTimeout(() => { popup.style.display = 'none'; popup.classList.remove('hiding'); }, 300);
  }, 3000);
}

function showMindamPopup(def) {
  const popup = document.getElementById('seolhwa-popup');
  document.getElementById('seolhwa-popup-icon').textContent = def.icon;
  document.getElementById('seolhwa-popup-name').textContent = def.name;
  document.getElementById('seolhwa-popup-desc').textContent = def.desc;
  popup.style.display = 'flex';
  setTimeout(() => { popup.style.display = 'none'; }, 3500);
}

function showItemPopup(itemKey) {
  const item = ITEMS[itemKey];
  if (!item) return;
  const popup = document.getElementById('constellation-popup');
  document.getElementById('const-msg').textContent = `${item.icon} ${item.name} 획득!`;
  document.getElementById('const-coin').textContent = item.desc;
  document.getElementById('const-coin').style.display = 'block';
  document.getElementById('const-favor').textContent = '';
  popup.classList.remove('hiding');
  popup.style.display = 'block';
  if (constTimer) clearTimeout(constTimer);
  constTimer = setTimeout(() => {
    popup.classList.add('hiding');
    setTimeout(() => { popup.style.display = 'none'; popup.classList.remove('hiding'); }, 300);
  }, 2500);
}

function maybeShowDeity() {
  if (Math.random() > 0.15) return;
  const keys = Object.keys(DEITIES);
  const key = keys[Math.floor(Math.random() * keys.length)];
  const d = DEITIES[key];
  const yeonin = state.deityYeonin[key] || 0;
  if (yeonin < 2) return; // 인연 없는 신은 반응 안 함
  const msgs = [
    `${d.icon} 【${d.name}】이 당신을 지켜보고 있습니다.`,
    `${d.icon} 【${d.name}】이 고개를 끄덕입니다.`,
    `신들이 술렁입니다.`,
  ];
  showDeityPopup(msgs[Math.floor(Math.random() * msgs.length)], 0, yeonin);
}

// --- CLEAR / ENDING ---
function goToClear(id, sc) {
  if (typingTimer) { clearInterval(typingTimer); typingTimer = null; }
  if (constTimer) { clearTimeout(constTimer); constTimer = null; }

  state.lastClear = sc;

  // 인연 최고치
  const maxTrust = Object.values(state.trust).length > 0
    ? Math.max(...Object.values(state.trust))
    : 0;

  // EP.1 클리어 저장
  if (sc.ep === 1) {
    const save = getSaveData();
    const endingKey = sc.ending || 'unknown';
    if (!save[state.char]) save[state.char] = {};
    save[state.char].lastEnding = endingKey;
    save[state.char].completed = true;
    save[state.char].maxTrust = maxTrust;
    setSaveData(save);
  }

  // 클리어 화면 렌더
  document.getElementById('final-trust').textContent = maxTrust;
  document.getElementById('final-seolhwa').textContent = state.mindam.length;
  document.getElementById('final-coin').textContent = state.singi;
  document.getElementById('clear-msg').textContent = sc.txt;

  const badge = document.getElementById('ending-badge');
  badge.textContent = sc.badge || '';
  badge.style.background = (sc.col || '#c084fc') + '22';
  badge.style.color = sc.col || '#c084fc';
  badge.style.border = '1px solid ' + (sc.col || '#c084fc') + '66';
  document.getElementById('clear-title').textContent = sc.ending || '클리어!';
  document.getElementById('clear-ep-label').textContent = sc.ep ? `1막 ${sc.ep}씬` : '1막';
  document.getElementById('clear-star').textContent = sc.badge === '진 루트 씨앗' ? '★' : '◈';

  const nextBtn = document.getElementById('next-ep-btn');
  nextBtn.style.display = sc.next ? 'inline-block' : 'none';
  if (sc.next) nextBtn.textContent = '2막으로 ▶';

  showScreen('clear');
}

// --- HUD ---
function updateHUD() {
  const sc = state.scenes ? state.scenes[state.sceneId] : null;
  const hudTrust = document.getElementById('hud-trust-pills');
  hudTrust.innerHTML = '';

  const spToTrust = {
    mother: 'mother', neighbor: 'neighbor', woman: 'woman', child: 'child',
  };
  const keys = [];
  if (sc && spToTrust[sc.sp]) keys.push(spToTrust[sc.sp]);
  const sorted = Object.entries(state.trust)
    .filter(([k]) => !keys.includes(k) && state.trust[k] > 0)
    .sort((a, b) => b[1] - a[1]);
  sorted.forEach(([k]) => keys.push(k));

  keys.slice(0, 2).forEach(key => {
    const t = TRUST_TARGETS[key];
    if (!t) return;
    const val = state.trust[key] || 0;
    const pill = document.createElement('div');
    pill.className = 'stat-pill';
    pill.innerHTML = `
      <span style="color:${t.col};font-size:10px">${t.icon}</span>
      <div class="stat-track"><div class="stat-fill" style="width:${val}%;background:${t.col}"></div></div>
      <span style="color:${t.col};font-size:10px">${val}</span>
    `;
    hudTrust.appendChild(pill);
  });

  document.getElementById('val-seolhwa').textContent = '📜 ' + state.mindam.length;
  document.getElementById('val-coin').textContent = '🔮 ' + state.singi;
}

window.skipTyping = skipTyping;
init();

</script>
<script>
// =======================================
// UI — 무당기(巫堂記) 모달 창
// =======================================

function renderModalTabs() {
  const tabs = [
    {id:'inventory', label:'🎒 아이템'},
    {id:'skills',    label:'⚡ 능력'},
    {id:'mindam',    label:'📜 민담'},
    {id:'deity',     label:'⭐ 신위'},
    {id:'shop',      label:'🔮 신기'},
  ];
  const wrap = document.getElementById('modal-tabs');
  wrap.innerHTML = '';
  tabs.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'modal-tab' + (t.id === currentTab ? ' active' : '');
    btn.textContent = t.label;
    btn.onclick = () => { currentTab = t.id; renderModalTabs(); renderModalContent(); };
    wrap.appendChild(btn);
  });
}

function renderModalContent() {
  const body = document.getElementById('modal-body');
  switch (currentTab) {
    case 'inventory': body.innerHTML = renderInventory(); break;
    case 'skills':    body.innerHTML = renderSkills();    break;
    case 'mindam':    body.innerHTML = renderMindam();    break;
    case 'deity':     body.innerHTML = renderDeity();     break;
    case 'shop':      body.innerHTML = renderShop();      break;
  }
}

// --- INVENTORY ---
function renderInventory() {
  if (state.items.length === 0) {
    return '<div class="modal-empty">아직 획득한 아이템이 없습니다.</div>';
  }
  return state.items.map(key => {
    const item = ITEMS[key];
    if (!item) return '';
    return `<div class="modal-card">
      <div class="modal-card-icon">${item.icon}</div>
      <div class="modal-card-info">
        <div class="modal-card-name">${item.name}</div>
        <div class="modal-card-desc">${item.desc}</div>
      </div>
    </div>`;
  }).join('');
}

// --- SKILLS ---
function renderSkills() {
  const charSkills = SKILLS[state.char] || [];
  if (charSkills.length === 0) return '<div class="modal-empty">능력 데이터 없음</div>';
  return charSkills.map(sk => {
    const unlocked = state.skills.includes(sk.id);
    return `<div class="modal-card ${unlocked ? '' : 'locked'}">
      <div class="modal-card-icon">${unlocked ? '⚡' : '🔒'}</div>
      <div class="modal-card-info">
        <div class="modal-card-name">${unlocked ? sk.name : '???'}</div>
        <div class="modal-card-desc">${unlocked ? sk.desc : (sk.condition || '잠금됨')}</div>
      </div>
    </div>`;
  }).join('');
}

// --- MINDAM (설화 대체) ---
function renderMindam() {
  const entries = Object.entries(MINDAM_DEFS);
  return entries.map(([id, def]) => {
    const owned = state.mindam.includes(id);
    return `<div class="modal-card ${owned ? 'seolhwa-owned' : 'locked'}">
      <div class="modal-card-icon">${owned ? def.icon : '❓'}</div>
      <div class="modal-card-info">
        <div class="modal-card-name">${owned ? def.name : '???'}</div>
        <div class="modal-card-desc">${owned ? def.desc : '미발견'}</div>
        ${owned ? '' : `<div class="modal-card-desc" style="margin-top:4px;color:rgba(255,255,255,.25)">조건: ${def.condition}</div>`}
      </div>
    </div>`;
  }).join('');
}

// --- DEITY (성좌 대체) ---
function renderDeity() {
  return Object.entries(DEITIES).map(([key, d]) => {
    const yeonin = state.deityYeonin[key] || 0;
    const sponsored = state.deitySponsored[key] || 0;
    const active = yeonin > 0;
    return `<div class="modal-card">
      <div class="modal-card-icon">${yeonin >= 30 ? '🌟' : yeonin >= 15 ? '✨' : d.icon}</div>
      <div class="modal-card-info">
        <div class="modal-card-name" style="color:${yeonin >= 15 ? '#fbbf24' : 'rgba(255,255,255,0.6)'}">${active ? d.name : '???'}</div>
        <div class="const-bar-wrap">
          <div class="const-bar" style="width:${yeonin}%;background:${yeonin >= 30 ? '#fbbf24' : yeonin >= 15 ? '#f59e0b' : '#c084fc'}"></div>
        </div>
        <div class="modal-card-desc">${active ? `인연 ${yeonin} · 신기 후원 ${sponsored}` : '아직 접촉 없음'}</div>
        ${yeonin >= 30 ? '<div class="modal-card-desc" style="color:#fbbf24;margin-top:4px">인연 30+ · 숨겨진 선택지 해금 가능</div>' : ''}
      </div>
    </div>`;
  }).join('');
}

// --- SHOP (신기 소비) ---
function renderShop() {
  return `<div class="modal-card" style="margin-bottom:8px;background:rgba(192,132,252,.05);border-color:rgba(192,132,252,.2)">
    <div class="modal-card-icon">🔮</div>
    <div class="modal-card-info">
      <div class="modal-card-name">현재 신기</div>
      <div class="modal-card-desc" style="font-size:20px;font-weight:700;color:#c084fc">${state.singi}</div>
    </div>
  </div>` +
  SHOP_ITEMS.map(item => {
    if (item.special === 'recharge') {
      return `<div class="modal-card">
        <div class="modal-card-icon">${item.icon}</div>
        <div class="modal-card-info">
          <div class="modal-card-name">${item.name}</div>
          <div class="modal-card-desc">${item.desc}</div>
        </div>
        <button class="modal-card-btn" onclick="useRecharge()">무료</button>
      </div>`;
    }
    const canBuy = state.singi >= item.cost;
    return `<div class="modal-card">
      <div class="modal-card-icon">${item.icon}</div>
      <div class="modal-card-info">
        <div class="modal-card-name">${item.name}</div>
        <div class="modal-card-desc">${item.desc}</div>
      </div>
      <button class="modal-card-btn ${canBuy ? '' : 'disabled'}"
        onclick="buyShopItem('${item.id}',${item.cost})"
        ${canBuy ? '' : 'disabled'}>🔮${item.cost}</button>
    </div>`;
  }).join('');
}

function buyShopItem(itemId, cost) {
  if (state.singi < cost) return;
  state.singi -= cost;
  switch (itemId) {
    case 'hint':
      state.shopHintActive = true;
      closeModal();
      showChoices();
      break;
    case 'mindam_h':
      showMindamHint();
      break;
  }
  updateHUD();
  renderModalContent();
}

function useRecharge() {
  state.singi += 10;
  updateHUD();
  renderModalContent();
}

function showMindamHint() {
  const unowned = Object.entries(MINDAM_DEFS).filter(([id]) => !state.mindam.includes(id));
  if (unowned.length === 0) {
    alert('모든 민담을 이미 수집했습니다!');
    return;
  }
  const [id, def] = unowned[Math.floor(Math.random() * unowned.length)];
  alert(`민담 실마리: ${def.name}\n\n조건: ${def.condition}`);
}

window.buyShopItem = buyShopItem;
window.useRecharge = useRecharge;

</script>
